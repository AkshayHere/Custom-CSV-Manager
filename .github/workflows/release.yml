name: Auto Release on Push to Main

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish exe
        run: dotnet publish -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true
        
      - name: Get version
        id: version
        shell: pwsh
        run: |
          $changelog = Get-Content CHANGELOG.md
          $versionLine = $changelog | Select-String -Pattern '## \[[0-9]+\.[0-9]+\.[0-9]+\]' | Select-Object -First 1

          if ($versionLine) {
              $version = [regex]::Match($versionLine, '\d+\.\d+\.\d+').Value
          } else {
              $version = "0.1.0"
          }

          echo "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create Git tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          files: bin/Release/net10.0/win-x64/publish/CSV2PipeDelimittedConverter.exe
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}